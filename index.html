<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🥊 AR Fighting Game</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <!-- ===== LOADING ===== -->
    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text">Loading Fighting Game...</p>
    </div>

    <!-- ===== START SCREEN ===== -->
    <div id="start-screen">
        <div class="card">
            <div class="logo">🥊</div>
            <h1>AR Fighting Game</h1>
            <p id="device-info">Checking device...</p>
            <p>Punch, block, and defeat your opponent!</p>
            <button id="start-btn">🎮 Start Game</button>
            <p id="status-text" class="status">Ready</p>
        </div>
    </div>

    <!-- ===== GAME UI ===== -->
    <div id="game-ui" style="display: none;">
        <div id="health-container">
            <div class="health-bar player-health">
                <div class="health-label">👊 YOU</div>
                <div class="health-track">
                    <div id="player-health-fill" class="health-fill" style="width: 100%"></div>
                </div>
            </div>
            <div class="health-bar enemy-health">
                <div class="health-label">👾 ENEMY</div>
                <div class="health-track">
                    <div id="enemy-health-fill" class="health-fill enemy" style="width: 100%"></div>
                </div>
            </div>
        </div>

        <div id="score-display">
            <span id="score-text">Score: 0</span>
            <span id="combo-text" style="display: none;">🔥 x<span id="combo-count">0</span></span>
        </div>

        <div id="gesture-indicator">
            <span id="gesture-text">✊ Ready</span>
        </div>

        <div id="enemy-status">
            <span id="enemy-state">🧠 Thinking...</span>
        </div>
    </div>

    <!-- ===== GAME CONTAINER (AR or Desktop) ===== -->
    <div id="game-container"></div>

    <!-- ===== STATUS MESSAGE ===== -->
    <div id="message"></div>

    <!-- ===== GAME OVER ===== -->
    <div id="game-over" style="display: none;">
        <div class="game-over-card">
            <h1 id="game-over-title">🏆 YOU WIN!</h1>
            <p id="game-over-score">Score: 0</p>
            <button id="restart-btn">🔄 Fight Again</button>
            <button id="share-result-btn">📤 Share Result</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { HandTracker } from './js/hand-tracker.js';
        import { FightingGame } from './js/game.js';

        // ============================================================
        // DOM REFS
        // ============================================================
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status-text');
        const deviceInfo = document.getElementById('device-info');
        const message = document.getElementById('message');
        const container = document.getElementById('game-container');
        const gameUI = document.getElementById('game-ui');
        const playerHealthFill = document.getElementById('player-health-fill');
        const enemyHealthFill = document.getElementById('enemy-health-fill');
        const scoreText = document.getElementById('score-text');
        const comboText = document.getElementById('combo-text');
        const comboCount = document.getElementById('combo-count');
        const gestureText = document.getElementById('gesture-text');
        const enemyState = document.getElementById('enemy-state');
        const gameOver = document.getElementById('game-over');
        const gameOverTitle = document.getElementById('game-over-title');
        const gameOverScore = document.getElementById('game-over-score');
        const restartBtn = document.getElementById('restart-btn');
        const shareResultBtn = document.getElementById('share-result-btn');

        // ============================================================
        // STATE
        // ============================================================
        let scene, camera, renderer, controls;
        let game = null;
        let handTracker = null;
        let fighterModel = null;
        let enemyModel = null;
        let isGameRunning = false;
        let isARMode = false;
        let messageTimeout = null;

        // ============================================================
        // HELPERS
        // ============================================================
        function showMessage(text, type = '') {
            message.textContent = text;
            message.className = 'show ' + type;
            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                message.className = '';
            }, 1500);
        }

        function updateStatus(text) {
            statusText.textContent = text;
        }

        function debug(text) {
            console.log('🔍', text);
        }

        // ============================================================
        // CHECK DEVICE SUPPORT
        // ============================================================
        async function checkDeviceSupport() {
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
            let isARSupported = false;
            
            if (navigator.xr) {
                try {
                    isARSupported = await navigator.xr.isSessionSupported('immersive-ar');
                } catch (e) {
                    isARSupported = false;
                }
            }
            
            return {
                isMobile,
                isARSupported,
                isDesktop: !isMobile
            };
        }

        // ============================================================
        // LOAD FIGHTER MODEL
        // ============================================================
        async function loadFighterModel() {
            return new Promise((resolve, reject) => {
                loadingText.textContent = '🦸 Loading Fighter...';
                debug('Loading fighter model...');

                const loader = new GLTFLoader();
                const dracoLoader = new DRACOLoader();
                dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
                loader.setDRACOLoader(dracoLoader);

                loader.load(
                    './models/fighter/fighter.glb',
                    (gltf) => {
                        debug('✅ Fighter model loaded!');
                        const model = gltf.scene;
                        model.scale.set(0.8, 0.8, 0.8);
                        model.position.set(0, 0, 0);
                        
                        if (gltf.animations && gltf.animations.length > 0) {
                            const mixer = new THREE.AnimationMixer(model);
                            const action = mixer.clipAction(gltf.animations[0]);
                            action.play();
                            model.userData.mixer = mixer;
                        }
                        
                        resolve(model);
                    },
                    (progress) => {
                        const pct = Math.round((progress.loaded / progress.total) * 100);
                        loadingText.textContent = `📥 Loading... ${pct}%`;
                    },
                    (error) => {
                        debug('❌ Model error: ' + error.message);
                        reject(error);
                    }
                );
            });
        }

        // ============================================================
        // CREATE PLACEHOLDER FIGHTER
        // ============================================================
        function createPlaceholderFighter(color = 0x00d4ff) {
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.4, 0.2),
                new THREE.MeshStandardMaterial({ color, metalness: 0.3 })
            );
            body.position.y = 0.2;
            group.add(body);
            
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0xffd93d })
            );
            head.position.y = 0.5;
            group.add(head);
            
            const armMat = new THREE.MeshStandardMaterial({ color });
            const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.3, 0.08), armMat);
            leftArm.position.set(-0.25, 0.3, 0);
            group.add(leftArm);
            
            const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.3, 0.08), armMat);
            rightArm.position.set(0.25, 0.3, 0);
            group.add(rightArm);
            
            const legMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e });
            const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.2, 0.08), legMat);
            leftLeg.position.set(-0.1, -0.1, 0);
            group.add(leftLeg);
            
            const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.2, 0.08), legMat);
            rightLeg.position.set(0.1, -0.1, 0);
            group.add(rightLeg);
            
            return group;
        }

        // ============================================================
        // SETUP SCENE (Shared for AR and Desktop)
        // ============================================================
        function setupScene() {
            debug('Setting up scene...');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.5, 3);
            
            renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: false
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            
            container.appendChild(renderer.domElement);
            
            // Controls (for desktop)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, 0.5, 0);
            controls.minDistance = 1;
            controls.maxDistance = 10;
            
            // Lights
            const ambient = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambient);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
            dirLight.position.set(0, 5, 5);
            dirLight.castShadow = true;
            scene.add(dirLight);
            
            const fill = new THREE.DirectionalLight(0x4488ff, 0.3);
            fill.position.set(-5, 0, 5);
            scene.add(fill);
            
            const hemi = new THREE.HemisphereLight(0x87ceeb, 0x362d1e, 0.3);
            scene.add(hemi);
            
            // Ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(4, 4),
                new THREE.MeshStandardMaterial({ 
                    color: 0x1a1a2e,
                    roughness: 0.8,
                    metalness: 0.1,
                    transparent: true,
                    opacity: 0.8
                })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Grid
            const grid = new THREE.GridHelper(4, 10, 0xff6b6b, 0x444466);
            grid.position.y = -0.05;
            scene.add(grid);
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            debug('✅ Scene setup complete');
        }

        // ============================================================
        // START DESKTOP MODE
        // ============================================================
        async function startDesktopMode() {
            debug('🖥️ Starting desktop mode...');
            showMessage('🖥️ Desktop Mode - Use mouse to rotate', '');
            
            // Add fighters
            if (fighterModel) {
                const playerClone = fighterModel.clone();
                playerClone.position.set(-0.8, 0, 0);
                scene.add(playerClone);
                fighterModel = playerClone;
                
                const enemyClone = fighterModel.clone();
                enemyClone.position.set(0.8, 0, 0);
                enemyClone.scale.set(0.8, 0.8, 0.8);
                enemyClone.traverse((node) => {
                    if (node.isMesh) {
                        if (node.material && node.material.color) {
                            node.material.color.setHex(0xff6b6b);
                        }
                    }
                });
                scene.add(enemyClone);
                enemyModel = enemyClone;
                debug('✅ Fighters added to scene');
            }
            
            startScreen.classList.add('hidden');
            gameUI.style.display = 'block';
            isGameRunning = true;
            
            // Initialize game
            initGame();
            
            // Start animation loop
            animate();
            
            showMessage('🥊 Fight! Use keyboard (1=Punch, 2=Block, 3=Special)', '');
            
            // Keyboard controls for desktop
            document.addEventListener('keydown', (e) => {
                if (game && !game.isGameOver) {
                    switch(e.key) {
                        case '1':
                            game.playerAction({ type: 'punch', confidence: 1.0 });
                            break;
                        case '2':
                            game.playerAction({ type: 'block', confidence: 1.0 });
                            break;
                        case '3':
                            game.playerAction({ type: 'special', confidence: 1.0 });
                            break;
                        case 'r':
                            if (game.isGameOver) {
                                gameOver.style.display = 'none';
                                game.reset();
                                showMessage('🥊 Fight!', '');
                            }
                            break;
                    }
                }
            });
        }

        // ============================================================
        // START AR MODE (Mobile)
        // ============================================================
        async function startARMode() {
            debug('📱 Starting AR mode...');
            
            // Enable AR on renderer
            renderer.xr.enabled = true;
            
            // Create AR button
            const arButton = ARButton.createButton(renderer, {
                requiredFeatures: ['local-floor'],
                onSessionStarted: (session) => {
                    debug('✅ AR Session started!');
                    isGameRunning = true;
                    startScreen.classList.add('hidden');
                    gameUI.style.display = 'block';
                    
                    // Add fighters
                    if (fighterModel) {
                        const playerClone = fighterModel.clone();
                        playerClone.position.set(-0.5, 0, -0.5);
                        scene.add(playerClone);
                        fighterModel = playerClone;
                        
                        const enemyClone = fighterModel.clone();
                        enemyClone.position.set(0.5, 0, -0.5);
                        enemyClone.scale.set(0.8, 0.8, 0.8);
                        enemyClone.traverse((node) => {
                            if (node.isMesh) {
                                if (node.material && node.material.color) {
                                    node.material.color.setHex(0xff6b6b);
                                }
                            }
                        });
                        scene.add(enemyClone);
                        enemyModel = enemyClone;
                        debug('✅ Fighters added to AR scene');
                    }
                    
                    // Initialize game
                    initGame();
                    
                    // Start hand tracking
                    startHandTracking();
                    
                    showMessage('🥊 Fight!', '');
                    
                    // Animation loop
                    renderer.setAnimationLoop(() => {
                        if (game) game.update();
                        if (fighterModel?.userData?.mixer) fighterModel.userData.mixer.update(0.016);
                        if (enemyModel?.userData?.mixer) enemyModel.userData.mixer.update(0.016);
                        renderer.render(scene, camera);
                    });
                },
                onSessionEnded: () => {
                    debug('⏹️ AR Session ended');
                    isGameRunning = false;
                    renderer.setAnimationLoop(null);
                    gameUI.style.display = 'none';
                    startScreen.classList.remove('hidden');
                    startBtn.textContent = '🎮 Start Game';
                },
                onError: (error) => {
                    debug('❌ AR Error: ' + error.message);
                    showMessage('❌ ' + error.message, 'error');
                    // Fallback to desktop mode
                    startDesktopMode();
                }
            });
            
            document.body.appendChild(arButton);
            arButton.click();
            
            // Hide button after click
            setTimeout(() => {
                if (arButton) arButton.style.display = 'none';
            }, 2000);
        }

        // ============================================================
        // INIT GAME
        // ============================================================
        function initGame() {
            game = new FightingGame();
            
            game.onHealthUpdate = (health) => {
                playerHealthFill.style.width = health.player + '%';
                enemyHealthFill.style.width = health.enemy + '%';
            };
            
            game.onScoreUpdate = (score) => {
                scoreText.textContent = 'Score: ' + score;
            };
            
            game.onComboUpdate = (comboData) => {
                if (comboData.combo > 1) {
                    comboText.style.display = 'block';
                    comboCount.textContent = comboData.combo;
                } else {
                    comboText.style.display = 'none';
                }
            };
            
            game.onMessage = (text, type) => {
                showMessage(text, type);
            };
            
            game.onGameOver = (data) => {
                gameOver.style.display = 'flex';
                gameOverTitle.textContent = data.result === 'win' ? '🏆 YOU WIN!' : '💀 YOU LOSE!';
                gameOverScore.textContent = 'Score: ' + data.score + ' | Max Combo: x' + data.maxCombo;
            };
            
            game.onEnemyAction = (action) => {
                const labels = {
                    'attack': '⚔️ Attacking!',
                    'block': '🛡️ Blocking!',
                    'special': '⚡ Special!',
                    'idle': '🧠 Thinking...',
                    'reaction': '💥 Stunned!'
                };
                enemyState.textContent = labels[action] || '🧠 Thinking...';
            };
            
            game.onPlayerAction = (gesture) => {
                const labels = {
                    'punch': '👊 Punch!',
                    'block': '🛡️ Block!',
                    'special': '⚡ Special!',
                    'fist': '✊ Ready',
                    'open': '🖐️ Open'
                };
                gestureText.textContent = labels[gesture.type] || '✊ Ready';
            };
            
            game.reset();
        }

        // ============================================================
        // HAND TRACKING (Mobile)
        // ============================================================
        function startHandTracking() {
            handTracker = new HandTracker({
                onGesture: (gesture) => {
                    if (game && !game.isGameOver) {
                        game.playerAction(gesture);
                    }
                },
                onHandPosition: (position) => {
                    if (fighterModel && position) {
                        fighterModel.position.x = position.x * 0.5;
                        fighterModel.position.z = position.z * 0.5 - 0.5;
                    }
                }
            });
            handTracker.start();
        }

        // ============================================================
        // ANIMATION LOOP (Desktop)
        // ============================================================
        function animate() {
            if (!isGameRunning) return;
            
            requestAnimationFrame(animate);
            
            if (game) game.update();
            if (fighterModel?.userData?.mixer) fighterModel.userData.mixer.update(0.016);
            if (enemyModel?.userData?.mixer) enemyModel.userData.mixer.update(0.016);
            
            controls.update();
            renderer.render(scene, camera);
        }

        // ============================================================
        // INITIALIZE
        // ============================================================
        async function init() {
            debug('🚀 Initializing Fighting Game...');
            
            try {
                // Check device support
                const device = await checkDeviceSupport();
                debug('Device:', device);
                
                // Setup scene
                setupScene();
                
                // Load fighter model
                try {
                    fighterModel = await loadFighterModel();
                } catch (error) {
                    debug('⚠️ Model not found, using placeholder');
                    fighterModel = createPlaceholderFighter();
                }
                
                // Show device info
                if (device.isDesktop) {
                    deviceInfo.textContent = '🖥️ Desktop Mode - Mouse controls + Keyboard (1=Punch, 2=Block, 3=Special)';
                    startBtn.textContent = '🎮 Start Desktop Game';
                } else if (device.isARSupported) {
                    deviceInfo.textContent = '📱 AR Mode - Use your hands to fight!';
                    startBtn.textContent = '🥊 Start AR Battle';
                } else {
                    deviceInfo.textContent = '📱 Mobile Mode - Touch controls + Hand tracking';
                    startBtn.textContent = '🎮 Start Game';
                }
                
                // Hide loading
                loading.classList.add('hidden');
                startScreen.classList.remove('hidden');
                updateStatus('Ready to fight!');
                
                // Start button
                startBtn.addEventListener('click', async () => {
                    if (device.isARSupported && !device.isDesktop) {
                        await startARMode();
                    } else {
                        await startDesktopMode();
                    }
                });
                
                // Restart button
                restartBtn.addEventListener('click', () => {
                    gameOver.style.display = 'none';
                    if (game) {
                        game.reset();
                        showMessage('🥊 Fight!', '');
                    }
                });
                
                // Share button
                shareResultBtn.addEventListener('click', () => {
                    if (navigator.share) {
                        navigator.share({
                            title: '🥊 AR Fighting Game',
                            text: `I scored ${game?.score || 0} points! Can you beat me?`,
                            url: window.location.href
                        }).catch(() => {});
                    } else {
                        navigator.clipboard?.writeText('I played AR Fighting Game! 🥊').then(() => {
                            showMessage('📋 Copied!', '');
                        });
                    }
                });
                
                debug('✅ Ready!');
                
            } catch (error) {
                debug('❌ Init error: ' + error.message);
                loadingText.textContent = '❌ Error loading';
                showMessage('Failed to load: ' + error.message, 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
